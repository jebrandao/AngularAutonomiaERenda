  <mat-card class="produto">
    <mat-card-header>
      <mat-card-title>{{ nome }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <p>{{ preco | currency: 'BRL' }}</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="selecionarProduto()">
        Selecionar
      </button>

      <button mat-stroked-button color="accent" (click)="adicionarAoCarrinho()">
        Adicionar ao Carrinho
      </button>
    </mat-card-actions>
  </mat-card>
