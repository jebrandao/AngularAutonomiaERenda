@for (item of produtos(); track item.nome) {
  <app-produto
    [nome]="item.nome"
    [preco]="item.preco"
    (produtoSelecionado)="exibirProduto($event)"
  ></app-produto>
}
<p><button (click)="adicionarProduto()">Adicionar Produto</button></p>
<p><button (click)="substituirProdutos()">Substituir Lista</button></p>
<h2>Total de produtos: {{ totalProdutos() }}</h2>
<h3>Valor total: R$ {{ valorTotal() }}</h3>
